<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Game</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#f7f7f7;
  font-family:Arial;
}

#game{
  position:relative;
  width:100%;
  height:300px;
  background:white;
  border-bottom:3px solid black;
}

#dino{
  position:absolute;
  width:50px;
  height:50px;
  background:black;
  bottom:0;
  left:50px;
}

.obstacle{
  position:absolute;
  width:20px;
  height:40px;
  background:green;
  bottom:0;
  right:-20px;
}

#score{
  position:absolute;
  top:10px;
  right:20px;
  font-size:20px;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">0</div>
  <div id="dino"></div>
</div>

<script>
const dino = document.getElementById("dino");
const scoreText = document.getElementById("score");
const game = document.getElementById("game");

let isJumping = false;
let velocity = 0;
let gravity = 0.8;
let score = 0;
let speed = 5;
let obstacles = [];
let gameOver = false;

// กระโดด
function jump(){
  if(!isJumping){
    velocity = 15;
    isJumping = true;
  }
}

document.addEventListener("keydown", e=>{
  if(e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

// สร้างสิ่งกีดขวาง
function spawnObstacle(){
  const obs = document.createElement("div");
  obs.className = "obstacle";
  obs.style.right = "-20px";
  game.appendChild(obs);
  obstacles.push(obs);
}

// อัปเดตเกม
function update(){
  if(gameOver) return;

  // ฟิสิกส์กระโดด
  velocity -= gravity;
  let bottom = parseFloat(dino.style.bottom || 0);
  bottom += velocity;

  if(bottom <= 0){
    bottom = 0;
    isJumping = false;
  }

  dino.style.bottom = bottom + "px";

  // ขยับสิ่งกีดขวาง
  obstacles.forEach((obs,index)=>{
    let right = parseFloat(obs.style.right);
    right += speed;
    obs.style.right = right + "px";

    const d = dino.getBoundingClientRect();
    const o = obs.getBoundingClientRect();

    if(
      d.left < o.right &&
      d.right > o.left &&
      d.top < o.bottom &&
      d.bottom > o.top
    ){
      alert("💀 GAME OVER\nScore: " + score);
      location.reload();
    }

    if(right > window.innerWidth){
      obs.remove();
      obstacles.splice(index,1);
    }
  });

  score++;
  scoreText.innerText = score;

  if(score % 500 === 0){
    speed += 1; // เพิ่มความเร็ว
  }

  requestAnimationFrame(update);
}

setInterval(spawnObstacle, 1500);
update();
</script>

</body>
</html>
