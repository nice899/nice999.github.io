<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Dino Game</title>

<style>
body{
  margin:0;
  background:#fff;
  overflow:hidden;
  font-family:monospace;
}

#game{
  position:relative;
  width:100%;
  height:300px;
  border-bottom:2px solid #000;
  overflow:hidden;
}

#dino{
  position:absolute;
  bottom:0;
  left:50px;
  width:72px;
  height:72px;
}

.pixel{
  width:6px;
  height:6px;
  float:left;
}

.pixel-container{
  width:72px;
  height:72px;
}

.cactus{
  position:absolute;
  bottom:0;
  font-size:35px;
}

.cloud{
  position:absolute;
  top:40px;
  font-size:28px;
  opacity:0.5;
}

#score{
  position:absolute;
  top:10px;
  right:20px;
  font-size:18px;
}

#startText{
  position:absolute;
  width:100%;
  top:120px;
  text-align:center;
  font-size:20px;
  color:#555;
}
</style>
</head>

<body>

<div id="game">
  <div id="dino"></div>
  <div id="score">00000</div>
  <div id="startText">กด Space หรือ แตะหน้าจอเพื่อเริ่ม</div>
</div>

<script>
const dino = document.getElementById("dino");
const scoreText = document.getElementById("score");
const startText = document.getElementById("startText");
const game = document.getElementById("game");

let velocity = 0;
let gravity = 0.6;
let isJumping = false;
let score = 0;
let speed = 6;
let obstacles = [];
let clouds = [];
let running = false;
let gameOver = false;
let frameToggle = false;

// pixel pattern 2 เฟรม (ขาวิ่งต่างกันเล็กน้อย)
const frames = [
[
"000011110000",
"000111111000",
"001111111100",
"001111111100",
"011111111110",
"011111111000",
"011111000000",
"011111111000",
"011111111100",
"001111011000",
"000110011000",
"000110011000"
],
[
"000011110000",
"000111111000",
"001111111100",
"001111111100",
"011111111110",
"011111111000",
"011111000000",
"011111111000",
"011111111100",
"001111001100",
"000110001100",
"000110001100"
]
];

function drawDino(pattern){
  dino.innerHTML="";
  const container=document.createElement("div");
  container.className="pixel-container";

  pattern.forEach(row=>{
    row.split("").forEach(cell=>{
      const pixel=document.createElement("div");
      pixel.className="pixel";
      pixel.style.background=cell==="1"?"#000":"transparent";
      container.appendChild(pixel);
    });
  });

  dino.appendChild(container);
}

drawDino(frames[0]);

// เริ่มเกม
function startGame(){
  if(!running){
    running=true;
    startText.style.display="none";
  }
}

// กระโดด
function jump(){
  if(!isJumping && running){
    velocity=14;
    isJumping=true;
  }
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    if(!running) startGame();
    else if(gameOver) location.reload();
    else jump();
  }
});

document.addEventListener("touchstart",()=>{
  if(!running) startGame();
  else if(gameOver) location.reload();
  else jump();
});

// สร้างกระบองเพชร
function spawnCactus(){
  if(!running || gameOver) return;
  const cactus=document.createElement("div");
  cactus.className="cactus";
  cactus.innerText="🌵";
  cactus.style.right="-40px";
  game.appendChild(cactus);
  obstacles.push(cactus);
}

// เมฆ
function spawnCloud(){
  const cloud=document.createElement("div");
  cloud.className="cloud";
  cloud.innerText="☁️";
  cloud.style.right="-50px";
  cloud.style.top=Math.random()*80+"px";
  game.appendChild(cloud);
  clouds.push(cloud);
}

function update(){
  if(!running || gameOver){
    requestAnimationFrame(update);
    return;
  }

  velocity -= gravity;
  let bottom=parseFloat(dino.style.bottom||0);
  bottom+=velocity;

  if(bottom<=0){
    bottom=0;
    isJumping=false;
  }

  dino.style.bottom=bottom+"px";

  // สลับเฟรมตอนวิ่ง
  if(!isJumping && score%10===0){
    frameToggle=!frameToggle;
    drawDino(frames[frameToggle?1:0]);
  }

  obstacles.forEach((obs,index)=>{
    let right=parseFloat(obs.style.right);
    right+=speed;
    obs.style.right=right+"px";

    const d=dino.getBoundingClientRect();
    const o=obs.getBoundingClientRect();

    if(
      d.left<o.right &&
      d.right>o.left &&
      d.top<o.bottom &&
      d.bottom>o.top
    ){
      gameOver=true;
      startText.innerText="GAME OVER - กดเพื่อเริ่มใหม่";
      startText.style.display="block";
    }

    if(right>window.innerWidth){
      obs.remove();
      obstacles.splice(index,1);
    }
  });

  clouds.forEach((c,index)=>{
    let right=parseFloat(c.style.right);
    right+=2;
    c.style.right=right+"px";
    if(right>window.innerWidth){
      c.remove();
      clouds.splice(index,1);
    }
  });

  score++;
  scoreText.innerText=String(score).padStart(5,"0");

  if(score%500===0){
    speed+=1;
  }

  requestAnimationFrame(update);
}

setInterval(spawnCactus,1500);
setInterval(spawnCloud,3000);

update();
</script>

</body>
</html>
